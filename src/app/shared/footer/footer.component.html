<footer class="footer py-5">
  <div class="container">
    <div class="row gy-4">
      <!-- Company Info -->
      <div class="col-lg-4 col-md-6 text-center text-md-start">
        <a class="footer-brand mb-3 d-inline-block" href="#">
          <img src="/assets/images/home/logo.png" alt="Logo" height="60">
        </a>
        <p class="tagline mb-3">تواصلوا معنا لتجربة مميزة</p>
        <div class="contact-info">
          <p class="mb-2">
            <i class="bi bi-envelope me-2"></i>
            <a href="mailto:info@example.com" class="contact-link">infoexample.com</a>
          </p>
          <p class="mb-2">
            <i class="bi bi-telephone me-2"></i>
            <a href="tel:+1234567890" class="contact-link">+123-456-7890</a>
          </p>
        </div>
      </div>
      <!-- Navigation Links -->
      <div class="col-lg-4 col-md-6 text-center">
        <h5 class="footer-heading mb-3">روابط سريعة</h5>
        <ul class="list-unstyled footer-nav">
          <li><a class="footer-link" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">الرئيسية</a></li>
          <li><a class="footer-link" routerLink="/about" routerLinkActive="active">من نحن</a></li>
          <li><a class="footer-link" routerLink="/reviews" routerLinkActive="active">الآراء</a></li>
          <li><a class="footer-link" routerLink="/library" routerLinkActive="active">المكتبة</a></li>
          <li><a class="footer-link" routerLink="/join" routerLinkActive="active">انضم إلينا</a></li>
          <li><a class="footer-link" routerLink="/contact" routerLinkActive="active">تواصل معنا</a></li>
        </ul>
      </div>
      <!-- Social Media -->
      <div class="col-lg-4 col-md-12 text-center">
        <h5 class="footer-heading mb-3">تابعنا</h5>
        <div class="social-icons d-flex justify-content-center gap-3">
          <a href="https://facebook.com" target="_blank" class="social-link" title="Facebook">
            <i class="bi bi-facebook"></i>
          </a>
          <a href="https://instagram.com" target="_blank" class="social-link" title="Instagram">
            <i class="bi bi-instagram"></i>
          </a>
          <a href="https://tiktok.com" target="_blank" class="social-link" title="TikTok">
            <i class="bi bi-tiktok"></i>
          </a>
          <a href="https://linkedin.com" target="_blank" class="social-link" title="LinkedIn">
            <i class="bi bi-linkedin"></i>
          </a>
        </div>
      </div>
    </div>
    <!-- Line Separator -->
    <hr class="separator my-4">
    <!-- Copyright -->
    <div class="text-center">
      <p class="copyright">© 2025 جميع الحقوق محفوظة</p>
    </div>
  </div>
</footer>
