<div class="container">
  <h2 class="title">إدارة معرض الصور</h2>

  <!-- Add/Edit Image Form (Visible only if logged in) -->
  <div *ngIf="isLoggedIn" class="add-form" #addForm>
    <h3 class="subtitle">{{ newImage.id ? 'تعديل الصورة' : 'إضافة صورة جديدة' }}</h3>
    <form (ngSubmit)="newImage.id ? updateImage() : addImage()" class="form">
      <div class="form-group">
        <label for="addTitle">العنوان:</label>
        <input id="addTitle" type="text" [(ngModel)]="newImage.title" name="title" required />
      </div>
      <div class="form-group">
        <label for="addDescription">الوصف:</label>
        <textarea id="addDescription" [(ngModel)]="newImage.description" name="description"></textarea>
      </div>
      <div class="form-group">
        <label for="addImage">اختر صورة: {{ newImage.id ? '(اختياري لتغيير الصورة)' : '' }}</label>
        <input id="addImage" type="file" (change)="onFileChange($event)" accept="image/jpeg,image/png,image/jpg" [required]="!newImage.id" />
      </div>
      <!-- Image Preview Section -->
      <div *ngIf="newImage.previewUrl" class="preview-section">
        <img [src]="newImage.previewUrl" alt="معاينة الصورة" class="preview-image" />
      </div>
      <div class="form-actions">
        <button type="button" (click)="cancelEdit()" class="btn btn-secondary" *ngIf="newImage.id">إلغاء</button>
        <button type="submit" class="btn btn-primary" [disabled]="!newImage.title || (!newImage.id && !newImage.file)">{{ newImage.id ? 'حفظ' : 'إضافة' }}</button>
      </div>
    </form>
    <p *ngIf="message" class="message" [ngClass]="{'success': isSuccess, 'error': !isSuccess}">{{ message }}</p>
  </div>

  <!-- Image Grid -->
  <div class="image-grid">
    <div *ngFor="let image of images" class="image-card">
      <img [src]="getImageUrl(image.imagePath)" [alt]="image.title" class="image" />
      <div class="image-details">
        <h4>{{ image.title }}</h4>
        <p>{{ image.description || 'لا يوجد وصف' }}</p>
        <p class="meta">تم الرفع بواسطة: {{ image.uploadedBy }}</p>
        <p class="meta">تاريخ الرفع: {{ image.createdAt | date:'short' }}</p>
        <div *ngIf="isLoggedIn" class="actions">
          <button (click)="openEditForm(image)" class="btn btn-accent">تعديل</button>
          <button (click)="deleteImage(image.id)" class="btn btn-danger">حذف</button>
        </div>
      </div>
    </div>
    <p *ngIf="!images.length" class="no-images">لا توجد صور في المعرض</p>
  </div>
</div>
