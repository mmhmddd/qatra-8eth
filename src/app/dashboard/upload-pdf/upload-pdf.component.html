<div class="container">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <div class="content">
    <!-- Upload Form -->
    <div class="upload-section">
      <h2>رفع ملف PDF</h2>

      <!-- Success/Error Messages -->
      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <!-- Form -->
      <form (ngSubmit)="uploadPdf()" class="upload-form" #uploadForm="ngForm">
        <div class="form-group">
          <label for="pdfFile">اختر ملف PDF:</label>
          <input
            type="file"
            id="pdfFile"
            accept="application/pdf"
            (change)="onFileSelected($event)"
            required
          />
        </div>

        <div class="form-group">
          <label for="title">العنوان:</label>
          <input
            type="text"
            id="title"
            [(ngModel)]="title"
            name="title"
            placeholder="أدخل عنوان الملف"
            required
            #titleInput="ngModel"
          />
        </div>

        <div class="form-group">
          <label for="description">الوصف:</label>
          <textarea
            id="description"
            [(ngModel)]="description"
            name="description"
            placeholder="أدخل وصف الملف"
            required
            #descriptionInput="ngModel"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="creatorName">اسم المنشئ:</label>
          <input
            type="text"
            id="creatorName"
            [(ngModel)]="creatorName"
            name="creatorName"
            placeholder="أدخل اسم المنشئ"
            required
            #creatorInput="ngModel"
          />
        </div>

        <button
          type="submit"
          [disabled]="!uploadForm.form.valid || !selectedFile"
        >
          رفع الملف
        </button>
      </form>
    </div>

    <!-- PDF List -->
    <div class="pdf-list-section">
      <h2>قائمة ملفات PDF</h2>

      <div *ngIf="pdfs.length > 0; else noPdfs" class="table-container">
        <table>
          <thead>
            <tr>
              <th>العنوان</th>
              <th>الوصف</th>
              <th>المنشئ</th>
              <th>اسم الملف</th>
              <th>تاريخ الرفع</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let pdf of pdfs; trackBy: trackByPdfId">
              <td>{{ pdf.title }}</td>
              <td>{{ pdf.description }}</td>
              <td>{{ pdf.creatorName }}</td>
              <td>{{ pdf.fileName }}</td>
              <td>{{ pdf.createdAt | date:'short':'ar' }}</td>
              <td>
                <button
                  class="view-btn"
                  (click)="viewPdf(pdf.id)"
                  type="button"
                >
                  عرض
                </button>
                <button
                  class="delete-btn"
                  (click)="deletePdf(pdf.id)"
                  type="button"
                >
                  حذف
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <ng-template #noPdfs>
        <p>لا توجد ملفات PDF لعرضها</p>
      </ng-template>
    </div>
  </div>
</div>
